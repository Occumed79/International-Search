openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Global Self-Pay Price Intelligence API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: search
    description: Price search operations
  - name: providers
    description: Provider operations
  - name: bookmarks
    description: Bookmark operations
  - name: admin
    description: Admin diagnostics
  - name: stats
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /search:
    post:
      operationId: searchPrices
      tags: [search]
      summary: Search for healthcare prices
      description: Search for posted self-pay prices across providers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /search/suggestions:
    get:
      operationId: getSearchSuggestions
      tags: [search]
      summary: Get search autocomplete suggestions
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Suggestion list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchSuggestion"

  /search/history:
    get:
      operationId: getSearchHistory
      tags: [search]
      summary: Get recent search history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchHistoryItem"

  /providers/{id}:
    get:
      operationId: getProvider
      tags: [providers]
      summary: Get provider detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Provider detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /providers/{id}/prices:
    get:
      operationId: getProviderPrices
      tags: [providers]
      summary: Get all prices for a provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Provider prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceResult"

  /bookmarks:
    get:
      operationId: getBookmarks
      tags: [bookmarks]
      summary: List saved bookmarks
      responses:
        "200":
          description: Bookmarks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bookmark"
    post:
      operationId: createBookmark
      tags: [bookmarks]
      summary: Save a provider bookmark
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookmarkBody"
      responses:
        "201":
          description: Bookmark created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bookmark"

  /bookmarks/{id}:
    delete:
      operationId: deleteBookmark
      tags: [bookmarks]
      summary: Remove a bookmark
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/top-services:
    get:
      operationId: getTopServices
      tags: [stats]
      summary: Get most searched services
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopService"

  /stats/source-breakdown:
    get:
      operationId: getSourceBreakdown
      tags: [stats]
      summary: Get price count by source type
      responses:
        "200":
          description: Source breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceBreakdownItem"

  /admin/diagnostics:
    get:
      operationId: getAdminDiagnostics
      tags: [admin]
      summary: Get crawl health and diagnostics
      responses:
        "200":
          description: Diagnostics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDiagnostics"

  /services/popular:
    get:
      operationId: getPopularServices
      tags: [search]
      summary: Get popular service categories for browsing
      responses:
        "200":
          description: Popular services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PopularService"

  /export/csv:
    post:
      operationId: exportCsv
      tags: [search]
      summary: Export search results as CSV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRequest"
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SearchRequest:
      type: object
      properties:
        query:
          type: string
        cptCode:
          type: ["string", "null"]
        specialty:
          type: ["string", "null"]
        providerName:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        postalCode:
          type: ["string", "null"]
        radiusMiles:
          type: ["integer", "null"]
        providerType:
          type: ["string", "null"]
        serviceType:
          type: ["string", "null"]
        cashPayOnly:
          type: boolean
          default: false
        hospitalOnly:
          type: boolean
          default: false
        clinicOnly:
          type: boolean
          default: false
        imagingOnly:
          type: boolean
          default: false
        labOnly:
          type: boolean
          default: false
        urgentCareOnly:
          type: boolean
          default: false
        dentalOnly:
          type: boolean
          default: false
        telehealthOnly:
          type: boolean
          default: false
        page:
          type: integer
          default: 1
        pageSize:
          type: integer
          default: 25
      required:
        - query

    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/PriceResult"
        nopriceProviders:
          type: array
          items:
            $ref: "#/components/schemas/NoPriceProvider"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        queryNormalized:
          type: string
        searchId:
          type: integer
      required:
        - results
        - nopriceProviders
        - total
        - page
        - pageSize
        - queryNormalized
        - searchId

    PriceResult:
      type: object
      properties:
        id:
          type: integer
        providerId:
          type: integer
        providerName:
          type: string
        organizationName:
          type: ["string", "null"]
        providerType:
          type: string
        specialty:
          type: ["string", "null"]
        serviceQuery:
          type: string
        normalizedService:
          type: string
        billingCode:
          type: ["string", "null"]
        exactPrice:
          type: number
        currency:
          type: string
        priceType:
          type: string
        evidenceText:
          type: ["string", "null"]
        sourceUrl:
          type: string
        sourceType:
          type: string
        country:
          type: string
        stateRegion:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        postalCode:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        timestampFound:
          type: string
        verificationStatus:
          type: string
        confidenceScore:
          type: number
      required:
        - id
        - providerId
        - providerName
        - providerType
        - serviceQuery
        - normalizedService
        - exactPrice
        - currency
        - priceType
        - sourceUrl
        - sourceType
        - country
        - timestampFound
        - verificationStatus
        - confidenceScore

    NoPriceProvider:
      type: object
      properties:
        providerId:
          type: integer
        providerName:
          type: string
        providerType:
          type: string
        city:
          type: ["string", "null"]
        stateRegion:
          type: ["string", "null"]
        country:
          type: string
        reason:
          type: string
      required:
        - providerId
        - providerName
        - providerType
        - country
        - reason

    SearchSuggestion:
      type: object
      properties:
        text:
          type: string
        category:
          type: string
        cptCode:
          type: ["string", "null"]
      required:
        - text
        - category

    SearchHistoryItem:
      type: object
      properties:
        id:
          type: integer
        query:
          type: string
        resultCount:
          type: integer
        searchedAt:
          type: string
      required:
        - id
        - query
        - resultCount
        - searchedAt

    ProviderDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        organizationName:
          type: ["string", "null"]
        npi:
          type: ["string", "null"]
        providerType:
          type: string
        specialty:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        stateRegion:
          type: ["string", "null"]
        postalCode:
          type: ["string", "null"]
        country:
          type: string
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        phone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        priceCount:
          type: integer
        lastUpdated:
          type: string
        sources:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - providerType
        - country
        - priceCount
        - lastUpdated
        - sources

    Bookmark:
      type: object
      properties:
        id:
          type: integer
        providerId:
          type: integer
        providerName:
          type: string
        providerType:
          type: string
        city:
          type: ["string", "null"]
        stateRegion:
          type: ["string", "null"]
        country:
          type: string
        createdAt:
          type: string
      required:
        - id
        - providerId
        - providerName
        - providerType
        - country
        - createdAt

    CreateBookmarkBody:
      type: object
      properties:
        providerId:
          type: integer
      required:
        - providerId

    StatsSummary:
      type: object
      properties:
        totalProviders:
          type: integer
        totalPrices:
          type: integer
        totalSources:
          type: integer
        countriesCovered:
          type: integer
        statesCovered:
          type: integer
        avgConfidenceScore:
          type: number
        recentSearchCount:
          type: integer
      required:
        - totalProviders
        - totalPrices
        - totalSources
        - countriesCovered
        - statesCovered
        - avgConfidenceScore
        - recentSearchCount

    TopService:
      type: object
      properties:
        service:
          type: string
        searchCount:
          type: integer
        avgPrice:
          type: ["number", "null"]
      required:
        - service
        - searchCount

    SourceBreakdownItem:
      type: object
      properties:
        sourceType:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required:
        - sourceType
        - count
        - percentage

    AdminDiagnostics:
      type: object
      properties:
        totalCrawls:
          type: integer
        successfulCrawls:
          type: integer
        failedCrawls:
          type: integer
        sourceHitRate:
          type: number
        extractionSuccessRate:
          type: number
        rejectedResults:
          type: integer
        staleResults:
          type: integer
        brokenSources:
          type: integer
        lastCrawlAt:
          type: ["string", "null"]
        connectorStatus:
          type: array
          items:
            $ref: "#/components/schemas/ConnectorStatus"
      required:
        - totalCrawls
        - successfulCrawls
        - failedCrawls
        - sourceHitRate
        - extractionSuccessRate
        - rejectedResults
        - staleResults
        - brokenSources
        - connectorStatus

    ConnectorStatus:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
        lastRun:
          type: ["string", "null"]
        recordsIngested:
          type: integer
      required:
        - name
        - status
        - recordsIngested

    PopularService:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        cptCode:
          type: ["string", "null"]
        avgPrice:
          type: ["number", "null"]
        providerCount:
          type: integer
      required:
        - name
        - category
        - providerCount

    ExportRequest:
      type: object
      properties:
        searchId:
          type: integer
        format:
          type: string
          default: csv
      required:
        - searchId
