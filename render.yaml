services:
  - type: web
    name: international-search
    runtime: node
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && (PORT=10000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/db push || echo "DB push skipped") && PORT=10000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/price-intel build && pnpm --filter @workspace/api-server build
    startCommand: node --enable-source-maps ./api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: VITE_HUB_URL
        value: https://price-search-tool.onrender.com
